<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>בית הכנסת פרוטליקס</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1 id="synagogue-title">פרוטליקס שלום ליעקב"</h1></header>
    <div class="main-content">
        <!-- דף 1: מנחה -->
        <div class="page active" id="page-weekdays">
            <div class="prayer-container-3">
                <div class="card-wrapper" style="max-width:550px;">
                    <div class="prayer-name" style="font-size:4.2rem; padding:16px 70px;">תפילת מנחה</div>
                    <div class="prayer-card" style="padding:50px 30px;"><div class="prayer-time" id="time-mincha" style="font-size:7.5rem; font-weight:900;">--:--</div></div>
                </div>
            </div>
        </div>
        <!-- דף 2: פרשת השבוע ומועדי כניסה/יציאה -->
        <div class="page" id="page-times">
            <div class="parasha-title" id="display-parasha">פרשת השבוע</div>
            <div class="prayer-container-3">
                <div class="card-wrapper"><div class="prayer-name">כניסת השבת</div><div class="prayer-card"><div class="prayer-time" id="shabbat-start">--:--</div></div></div>
                <div class="card-wrapper"><div class="prayer-name">יציאת השבת</div><div class="prayer-card"><div class="prayer-time" id="shabbat-end">--:--</div></div></div>
            </div>
        </div>
        <!-- דף 3: נר תמיד בהיכל ה' -->
        <div class="page" id="page-memorial">
            <div class="page-title">🕯️ נר תמיד בהיכל ה' 🕯️</div>
            <div class="memorial-grid" id="memorial-box-grid"></div>
        </div>
    </div>
    <div class="bottom-area">
        <div class="marquee-container"><div class="marquee-text" id="marquee-box">טוען הודעות מערכת...</div></div>
        <footer>
            <div class="footer-right" id="heb-date">טוען תאריך עברי...</div>
            <div class="footer-center">
                <div>זריחה: <strong id="sun-rise">--:--</strong></div>
                <div>שקיעה: <strong id="sun-set">--:--</strong></div>
            </div>
            <div class="footer-left" id="footer-clock">00:00:00</div>
        </footer>
    </div>
    <script>
        // pageIds נבנה דינמית לפי מספר עמודי הנפטרים
        let pageIds = ["page-weekdays", "page-times", "page-memorial"];
        let currentIdx = 0, slideInterval = null, globalSun = null;
        const MEMORIAL_PER_PAGE = 16;

        const dayLettersMap = {
            1:"א'", 2:"ב'", 3:"ג'", 4:"ד'", 5:"ה'", 6:"ו'", 7:"ז'", 8:"ח'", 9:"ט'", 10:"י'",
            11:'י"א', 12:'י"ב', 13:'י"ג', 14:'י"ד', 15:'ט"ו', 16:'ט"ז', 17:'י"ז', 18:'י"ח', 19:'י"ט', 20:"כ'",
            21:'כ"א', 22:'כ"ב', 23:'כ"ג', 24:'כ"ד', 25:'כ"ה', 26:'כ"ו', 27:'כ"ז', 28:'כ"ח', 29:'כ"ט', 30:"ל'"
        };

        // ───── שעון ─────
        setInterval(() => {
            document.getElementById('footer-clock').textContent =
                new Date().toLocaleTimeString('he-IL', { hour12: false });
        }, 1000);

        // ───── מצגת דפים ─────
        function startSlideshow(seconds) {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                if (!globalSun) return;
                const now = new Date();
                const [sh, sm] = globalSun.s.split(':').map(Number);
                const sunsetMins = sh * 60 + sm;
                const nowMins = now.getHours() * 60 + now.getMinutes();
                const isShabbatNow =
                    (now.getDay() === 5 && nowMins >= sunsetMins) ||
                    (now.getDay() === 6 && nowMins <= sunsetMins + 40);

                document.getElementById(pageIds[currentIdx]).classList.remove('active');
                currentIdx = (currentIdx + 1) % pageIds.length;
                document.getElementById(pageIds[currentIdx]).classList.add('active');
            }, seconds * 1000);
        }

        // ───── המרת מספר לאות עברית ─────
        function numToHebrewGematria(num, isYear = false) {
            if (dayLettersMap[num] && !isYear) return dayLettersMap[num];
            const ones = ["","א","ב","ג","ד","ה","ו","ז","ח","ט"];
            const tens = ["","י","כ","ל","מ","נ","ס","ע","פ","צ"];
            const hundreds = ["","ק","ר","ש","ת"];
            if (isYear) num = num % 1000;
            let result = "";
            if (num >= 400) { result += "ת"; num -= 400; }
            while (num >= 100) {
                for (let i = 4; i > 0; i--) {
                    if (num >= i * 100) { result += hundreds[i]; num -= i * 100; break; }
                }
            }
            if (num === 15) return result + "טו";
            if (num === 16) return result + "טז";
            return result + tens[Math.floor(num / 10)] + ones[num % 10];
        }

        // ───── זמני שקיעה וזריחה לפי חודש (ישראל) ─────
        function getPreciseOfflineSunTimes() {
            const m = new Date().getMonth() + 1;
            // זמנים מחושבים לאופק חיפה (32.794°N 34.989°E) — כניסת שבת 31 דק' לפני שקיעה, יציאה 44 דק' אחרי
            const data = {
                1: {r:"06:42",s:"16:56",c:"16:25",e:"17:40"},
                2: {r:"06:23",s:"17:25",c:"16:54",e:"18:09"},
                3: {r:"05:50",s:"17:47",c:"17:16",e:"18:31"},
                4: {r:"06:10",s:"19:09",c:"18:38",e:"19:53"},
                5: {r:"05:41",s:"19:31",c:"19:00",e:"20:15"},
                6: {r:"05:31",s:"19:49",c:"19:18",e:"20:33"},
                7: {r:"05:42",s:"19:48",c:"19:17",e:"20:32"},
                8: {r:"06:03",s:"19:25",c:"18:54",e:"20:09"},
                9: {r:"06:23",s:"18:46",c:"18:15",e:"19:30"},
                10:{r:"06:44",s:"18:07",c:"17:36",e:"18:51"},
                11:{r:"06:10",s:"16:38",c:"16:07",e:"17:22"},
                12:{r:"06:35",s:"16:35",c:"16:04",e:"17:19"}
            };
            return data[m] || {r:"05:31",s:"19:49",c:"19:18",e:"20:33"};
        }

        // ───── תזוזת זמן לפי דקות ─────
        function offsetTime(timeStr, offset) {
            const [h0, m0] = timeStr.split(':').map(Number);
            let totalMins = h0 * 60 + m0 + offset;
            totalMins = ((totalMins % 1440) + 1440) % 1440; // wrap around 24h
            const h = Math.floor(totalMins / 60);
            const m = totalMins % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }

        // ───── פרשת השבוע — אלגוריתם מלא ומדויק לנצח ─────
        function getParasha() {
            const PARSHIOT = [
                "בראשית","נח","לך לך","וירא","חיי שרה","תולדות","ויצא","וישלח","וישב","מקץ","ויגש","ויחי",
                "שמות","וארא","בא","בשלח","יתרו","משפטים","תרומה","תצוה","כי תשא","ויקהל-פקודי",
                "ויקרא","צו","שמיני","תזריע-מצורע","אחרי מות-קדושים","אמור","בהר-בחוקותי",
                "במדבר","נשא","בהעלותך","שלח","קורח","חוקת","בלק","פנחס","מטות-מסעי",
                "דברים","ואתחנן","עקב","ראה","שופטים","כי תצא","כי תבוא","נצבים-וילך","האזינו","וזאת הברכה"
            ];

            function nextSaturday(d) {
                const s = new Date(d);
                s.setDate(d.getDate() + ((6 - d.getDay() + 7) % 7));
                s.setHours(0,0,0,0);
                return s;
            }

            // קרא עוגן מ-localStorage אם קיים (כוון ידנית מ-admin)
            let ANCHOR_DATE = new Date(2025, 0, 4);
            let ANCHOR_PARASHA = 6; // ויצא
            try {
                const stored = localStorage.getItem('parasha_anchor');
                if (stored) {
                    const a = JSON.parse(stored);
                    ANCHOR_DATE = new Date(a.date);
                    ANCHOR_PARASHA = parseInt(a.idx);
                }
            } catch(e) {}

            const sat = nextSaturday(new Date());
            const diffWeeks = Math.round((sat - ANCHOR_DATE) / (7 * 24 * 60 * 60 * 1000));
            let idx = (ANCHOR_PARASHA + diffWeeks) % PARSHIOT.length;
            if (idx < 0) idx += PARSHIOT.length;
            if (PARSHIOT[idx] === "וזאת הברכה") idx = (idx + 1) % PARSHIOT.length;
            return PARSHIOT[idx];
        }

        // ───── מיון לפי קרבה לתאריך עברי נוכחי ─────
        const hebrewMonthOrder = {
            'תשרי':1, 'חשוון':2, 'כסלו':3, 'טבת':4, 'שבט':5,
            'אדר':6, 'אדר א':7, 'אדר ב':8,
            'ניסן':9, 'אייר':10, 'סיוון':11, 'תמוז':12, 'אב':13, 'אלול':14
        };

        function sortByProximity(list, currentDay, currentMonthName) {
            const currentMonthNum = hebrewMonthOrder[currentMonthName] || 1;
            const TOTAL_MONTHS = 14;

            function daysUntilYahrzeit(item) {
                const itemMonthNum = hebrewMonthOrder[item.month] || 1;
                // חשב מרחק בחודשים קדימה (מעגלי)
                let monthDiff = (itemMonthNum - currentMonthNum + TOTAL_MONTHS) % TOTAL_MONTHS;
                // אם אותו חודש — חשב לפי יום
                if (monthDiff === 0) {
                    const dayDiff = item.day - currentDay;
                    if (dayDiff >= 0) return dayDiff;           // עוד השנה
                    return TOTAL_MONTHS * 30 + dayDiff + 30;    // שנה הבאה
                }
                // חודש שונה — הערכה גסה בימים
                return monthDiff * 30 + (item.day - currentDay);
            }

            return [...list].sort((a, b) => daysUntilYahrzeit(a) - daysUntilYahrzeit(b));
        }

        // ───── כרטיסי נפטרים עם עימוד ויארצייט בראש ─────
        function buildMemorialCardHTML(item, isHighlight) {
            const highlightClass = isHighlight ? "memorial-card highlight" : "memorial-card";
            const yearText = item.year ? ` ${item.year}` : '';
            return `<div class="${highlightClass}">
                <div class="m-name">${item.name}</div>
                <div class="m-date">${dayLettersMap[item.day] || item.day} ב${item.month}${yearText}</div>
                <div class="m-suffix">ת.נ.צ.ב.ה.</div>
            </div>`;
        }

        function buildYahrzeitRowHTML(yahrzeitItems) {
            if (yahrzeitItems.length === 0) return '';
            const cards = yahrzeitItems.map(item => {
                const yearText = item.year ? ` ${item.year}` : '';
                return `<div class="memorial-card highlight yahrzeit-card">
                    <div class="yahrzeit-label">🕯️ שבוע אזכרה 🕯️</div>
                    <div class="m-name">${item.name}</div>
                    <div class="m-date">${dayLettersMap[item.day] || item.day} ב${item.month}${yearText}</div>
                    <div class="m-suffix">ת.נ.צ.ב.ה.</div>
                </div>`;
            }).join('');
            return `<div class="yahrzeit-row">${cards}</div>`;
        }

        function loadMemorialCards(config) {
            document.querySelectorAll('.page-memorial-extra').forEach(el => el.remove());

            const baseMemorial = document.getElementById('page-memorial');
            const list = config.deceasedList || [];
            pageIds = ["page-weekdays", "page-times", "page-memorial"];

            if (list.length === 0) {
                document.getElementById('memorial-box-grid').innerHTML =
                    '<div style="color:rgba(255,255,255,0.6);font-size:2rem;grid-column:span 4;text-align:center;padding-top:40px;">אין נפטרים ברשימה</div>';
                return;
            }

            // חישוב יארצייט השבוע
            let currentDay = 0, currentMonth = '';
            try {
                const parts = new Intl.DateTimeFormat('he-IL-u-ca-hebrew', {day:'numeric',month:'long'}).formatToParts(new Date());
                currentDay = parseInt(parts.find(p => p.type === 'day').value);
                currentMonth = parts.find(p => p.type === 'month').value.trim();
                if (currentMonth === "סיון") currentMonth = "סיוון";
            } catch(e) {}

            const isYahrzeit = item => {
                let m = item.month.trim();
                if (m === "סיון") m = "סיוון";

                const TOTAL = 14;
                const currentMonthNum = hebrewMonthOrder[currentMonth] || 1;
                const itemMonthNum = hebrewMonthOrder[m] || 1;

                // חשב ימים עד האזכרה (תוך התחשבות במעבר חודש)
                let daysUntil;
                if (itemMonthNum === currentMonthNum) {
                    daysUntil = item.day - currentDay;
                    if (daysUntil < 0) daysUntil += 365;
                } else {
                    const daysLeftInMonth = 30 - currentDay;
                    const monthsAway = (itemMonthNum - currentMonthNum + TOTAL) % TOTAL;
                    daysUntil = daysLeftInMonth + (monthsAway - 1) * 30 + item.day;
                }

                return daysUntil >= 0 && daysUntil <= 7;
            };

            // מיין לפי קרבה לתאריך עברי נוכחי — רק לקביעת יארצייטים, לא לסידור הרשימה
            const sortedList = list; // שמור על הסדר הידני שנקבע על ידי הגבאי

            // הפרד יארצייט משאר הרשימה
            const yahrzeitItems = sortedList.filter(isYahrzeit);
            const regularItems  = sortedList.filter(item => !isYahrzeit(item));

            const yahrzeitRowHTML = buildYahrzeitRowHTML(yahrzeitItems);
            const totalPages = Math.ceil(regularItems.length / MEMORIAL_PER_PAGE) || 1;

            for (let pageNum = 0; pageNum < totalPages; pageNum++) {
                const chunk = regularItems.slice(pageNum * MEMORIAL_PER_PAGE, (pageNum + 1) * MEMORIAL_PER_PAGE);
                const gridHTML = chunk.map(item => buildMemorialCardHTML(item, false)).join('');

                const pageIndicator = totalPages > 1
                    ? `<div class="memorial-page-indicator">${pageNum + 1} / ${totalPages}</div>`
                    : '';

                if (pageNum === 0) {
                    document.getElementById('memorial-box-grid').innerHTML = gridHTML;
                    baseMemorial.querySelector('.yahrzeit-row')?.remove();
                    baseMemorial.querySelector('.memorial-page-indicator')?.remove();
                    if (yahrzeitRowHTML) {
                        document.getElementById('memorial-box-grid').insertAdjacentHTML('beforebegin', yahrzeitRowHTML);
                    }
                    if (totalPages > 1) baseMemorial.insertAdjacentHTML('beforeend', pageIndicator);
                } else {
                    const extraId = `page-memorial-${pageNum}`;
                    const extraPage = document.createElement('div');
                    extraPage.className = 'page page-memorial-extra';
                    extraPage.id = extraId;
                    extraPage.innerHTML = `
                        <div class="page-title">🕯️ נר תמיד בהיכל ה' 🕯️</div>
                        ${yahrzeitRowHTML}
                        <div class="memorial-grid memorial-grid-4">${gridHTML}</div>
                        ${pageIndicator}
                    `;
                    baseMemorial.parentNode.insertBefore(extraPage, baseMemorial.nextSibling);
                    pageIds.push(extraId);
                }
            }
        }

        // ───── חישוב ראשי ─────
        function calculateAndDisplay() {
            globalSun = getPreciseOfflineSunTimes();
            document.getElementById('sun-rise').textContent = globalSun.r;
            document.getElementById('sun-set').textContent = globalSun.s;

            const defaultConfig = {
                pageInterval: '10',
                synagogueName: 'בית הכנסת "שערי שלום ליעקב"',
                titleColor: '#f1f5f9',
                shacharitTime: '05:45',
                minchaMode: 'auto',
                minchaOffset: '-31',
                minchaTime: '19:18',
                arvitMode: 'auto',
                arvitOffset: '20',
                arvitTime: '20:12',
                shabbatMinchaErev: "15 דק' לאחר נרות",
                shabbatShacharit: '08:00',
                shabbatMincha: '18:00',
                shabbatArvitMotzei: "20 דק' לאחר שקיעה",
                announcement: 'ברוכים הבאים לבית הכנסת שערי שלום ליעקב.',
                deceasedList: []
            };

            let config = defaultConfig;
            try {
                const stored = localStorage.getItem('synagogue_config');
                if (stored) config = Object.assign({}, defaultConfig, JSON.parse(stored));
            } catch(e) {}

            startSlideshow(parseInt(config.pageInterval) || 10);

            // ── כותרת בית הכנסת ──
            const titleEl = document.getElementById('synagogue-title');
            titleEl.textContent = config.synagogueName || defaultConfig.synagogueName;
            titleEl.style.color = config.titleColor || defaultConfig.titleColor;

            document.getElementById('marquee-box').textContent = config.announcement || defaultConfig.announcement;

            // ── מנחה חול ──
            const mOffset = parseInt(config.minchaOffset);
            document.getElementById('time-mincha').textContent =
                config.minchaMode === 'auto'
                    ? offsetTime(globalSun.s, isNaN(mOffset) ? -20 : mOffset)
                    : config.minchaTime;

            // ── פרשת השבוע + כניסה/יציאה ──
            const parasha = getParasha();
            console.log('פרשת השבוע:', parasha);
            document.getElementById('display-parasha').textContent = 'פרשת השבוע: ' + parasha;
            document.getElementById('shabbat-start').textContent = globalSun.c;
            document.getElementById('shabbat-end').textContent = globalSun.e;

            loadMemorialCards(config);

            // ── צבעי קוביות נפטרים ──
            if (config.memorialBgColor || config.memorialNameColor || config.memorialDateColor || config.memorialBorderColor) {
                const styleTag = document.createElement('style');
                const bw = config.memorialBorderWidth !== undefined ? config.memorialBorderWidth : '1';
                const bc = config.memorialBorderColor || 'rgba(255,255,255,0.3)';
                styleTag.textContent = `
                    .memorial-card:not(.highlight) { background: ${config.memorialBgColor || 'transparent'} !important; border: ${bw}px solid ${bc} !important; }
                    .memorial-card:not(.highlight) .m-name { color: ${config.memorialNameColor || '#ffffff'} !important; }
                    .memorial-card:not(.highlight) .m-date { color: ${config.memorialDateColor || '#e8e8e8'} !important; }
                `;
                document.head.appendChild(styleTag);
            }

            // ── תאריך עברי ──
            try {
                const formatter = new Intl.DateTimeFormat('he-IL-u-ca-hebrew', {day:'numeric',month:'long',year:'numeric'});
                const parts = formatter.formatToParts(new Date());
                let dayVal = parseInt(parts.find(p => p.type === 'day').value);
                let yearVal = parseInt(parts.find(p => p.type === 'year').value);
                let monthStr = parts.find(p => p.type === 'month').value;
                let dayHeb = dayLettersMap[dayVal] || String(dayVal);
                let yearHeb = numToHebrewGematria(yearVal, true);
                // הוסף גרשיים לשנה רק אם אין כבר
                if (yearHeb.length > 1) {
                    yearHeb = yearHeb.slice(0,-1) + '"' + yearHeb.slice(-1);
                }
                yearHeb = "ה'" + yearHeb;
                document.getElementById('heb-date').textContent = `${dayHeb} ב${monthStr} ${yearHeb}`;
            } catch(e) { console.error('Hebrew date error:', e); }
        }

        calculateAndDisplay();
    </script>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsPV3GhppKWG7L7PdD1tq5VG-WIxkyEvc",
            authDomain: "ai-screen--2.firebaseapp.com",
            projectId: "ai-screen--2",
            storageBucket: "ai-screen--2.firebasestorage.app",
            messagingSenderId: "98308389383",
            appId: "1:98308389383:web:7642951a398d2703f248a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // האזן לשינויים בזמן אמת — כל עדכון מהנייד יופיע מיד על המסך
        onSnapshot(doc(db, "synagogue", "config"), (docSnap) => {
            if (docSnap.exists()) {
                localStorage.setItem('synagogue_config', JSON.stringify(docSnap.data()));
                calculateAndDisplay();
            }
        });
    </script>
</body>
